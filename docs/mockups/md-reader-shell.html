<!DOCTYPE html>
<!--
  md-reader — UI 디자인 시안 (Manuscript)
  · 단일 자체완결 파일. 빌드/네트워크 불필요. CDN·원격 자산 없음(오프라인 원칙).
  · 실제 코드 매핑: 컬러 = src/app/themes/index.ts 의 5토큰(--bg/--fg/--accent/--surface/--border) × light/dark/paper.
                   라벨 = src/app/locales/{ko,en}.json 키. 레이아웃 = docs/design/architecture.md 3영역 셸.
  · 파생색은 color-mix()로 5토큰에서 계산 → 3테마 자동 대응(하드코딩 최소화).
  · 폰트 = Windows 11 기본 오프라인 폰트만(Segoe UI Variable / Cascadia Code / Palatino Linotype).
-->
<html lang="ko" data-theme="light" data-lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>md-reader — 시안</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='7' fill='%232563eb'/%3E%3C/svg%3E" />
<style>
/* ============================================================
   1. 테마 토큰 (실제 themes/index.ts 값과 동일)
   ============================================================ */
:root[data-theme="light"]{
  --bg:#ffffff; --fg:#1a1a1a; --accent:#2563eb; --surface:#f5f5f5; --border:#e2e2e2;
  --shadow: 0 1px 2px rgba(20,20,20,.05), 0 14px 40px rgba(20,20,20,.11);
  color-scheme: light;
}
:root[data-theme="dark"]{
  --bg:#1e1e1e; --fg:#e6e6e6; --accent:#60a5fa; --surface:#252526; --border:#333333;
  --shadow: 0 1px 2px rgba(0,0,0,.4), 0 18px 44px rgba(0,0,0,.55);
  color-scheme: dark;
}
:root[data-theme="paper"]{
  --bg:#f4ecd8; --fg:#3b2f2f; --accent:#8a5a2b; --surface:#efe6d0; --border:#dcceb0;
  --shadow: 0 1px 2px rgba(59,47,47,.07), 0 16px 40px rgba(59,47,47,.17);
  color-scheme: light;
}

/* 파생 토큰 — 5개 코어 토큰에서 계산. 3테마 모두 자동 대응 */
:root{
  --muted:  color-mix(in srgb, var(--fg) 50%, var(--bg));
  --faint:  color-mix(in srgb, var(--fg) 28%, var(--bg));
  --hover:  color-mix(in srgb, var(--fg) 7%,  var(--bg));
  --sunken: color-mix(in srgb, var(--bg) 94%, #000);
  --active-bg:  color-mix(in srgb, var(--accent) 13%, var(--bg));
  --active-line:color-mix(in srgb, var(--accent) 40%, var(--border));
  --ring:   color-mix(in srgb, var(--accent) 42%, transparent);
  --tok-code: color-mix(in srgb, var(--accent) 52%, var(--fg));

  /* 타이포 — Windows 11 기본 오프라인 폰트 */
  --ui-font: "Segoe UI Variable Text","Segoe UI Variable Display","Segoe UI",system-ui,-apple-system,sans-serif;
  --mono-font: "Cascadia Code","Cascadia Mono",ui-monospace,"SF Mono",Consolas,monospace;
  --read-font: "Palatino Linotype","Book Antiqua",Georgia,"Times New Roman",serif;

  --r-sm:6px; --r-md:9px; --r-lg:12px;
}

/* ============================================================
   2. 리셋 & 데스크 프레임
   ============================================================ */
*{ box-sizing:border-box; }
html,body{ height:100%; margin:0; }
body{
  font-family:var(--ui-font);
  background: color-mix(in srgb, var(--fg) 15%, var(--bg));
  display:grid; place-items:center;
  padding:26px;
  transition: background-color .28s ease;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}

/* 앱 창 — 1200×800(실제 window 크기)로 프레이밍한 시안 */
.app{
  width:min(1200px, 100%);
  height:min(800px, calc(100vh - 52px));
  background:var(--bg); color:var(--fg);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  box-shadow:var(--shadow);
  overflow:hidden;
  display:grid;
  grid-template-columns:248px 1fr;
  grid-template-rows:44px 1fr 27px;
  grid-template-areas:
    "titlebar titlebar"
    "sidebar  content"
    "statusbar statusbar";
  transition: background-color .26s ease, color .26s ease, border-color .26s ease, box-shadow .26s ease;
}

/* ============================================================
   3. 상단바
   ============================================================ */
.titlebar{
  grid-area:titlebar;
  display:flex; align-items:center; gap:8px;
  padding:0 8px 0 14px;
  border-bottom:1px solid var(--border);
  background: color-mix(in srgb, var(--surface) 55%, var(--bg));
  transition: background-color .26s ease, border-color .26s ease;
  -webkit-app-region:drag; /* 실제 앱에서 드래그 영역 힌트 */
}
.brand{ display:flex; align-items:center; gap:8px; font-weight:600; font-size:13.5px; letter-spacing:.01em; }
.brand .dot{ width:9px; height:9px; border-radius:50%; background:var(--accent);
  box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent); }

.sep{ width:1px; height:18px; background:var(--border); margin:0 4px; }

.tgroup{ display:flex; align-items:center; gap:2px; -webkit-app-region:no-drag; }
.tbtn{
  display:inline-flex; align-items:center; gap:6px;
  height:28px; padding:0 9px;
  border:1px solid transparent; border-radius:var(--r-sm);
  background:transparent; color:var(--fg); font:inherit; font-size:12.5px;
  cursor:pointer; white-space:nowrap;
  transition: background-color .14s ease, border-color .14s ease, color .14s ease;
}
.tbtn:hover{ background:var(--hover); }
.tbtn .ic{ color:var(--muted); }
.tbtn:hover .ic{ color:var(--accent); }
.tbtn.icon{ padding:0; width:28px; justify-content:center; }

.spacer{ flex:1; }

.search{
  -webkit-app-region:no-drag;
  display:flex; align-items:center; gap:7px;
  height:28px; width:210px; padding:0 10px;
  background:var(--bg); border:1px solid var(--border); border-radius:999px;
  color:var(--muted);
  transition: border-color .16s ease, box-shadow .16s ease, width .2s ease;
}
.search:focus-within{ border-color:var(--accent); box-shadow:0 0 0 3px var(--ring); width:230px; }
.search .ic{ flex:none; }
.search input{
  border:0; outline:0; background:transparent; color:var(--fg);
  font:inherit; font-size:12.5px; width:100%;
}
.search input::placeholder{ color:var(--muted); }

/* 세그먼트 컨트롤 (테마 / 언어) */
.seg{
  -webkit-app-region:no-drag;
  display:inline-flex; align-items:center;
  background:var(--surface); border:1px solid var(--border);
  border-radius:999px; padding:2px; gap:2px;
  transition: background-color .2s ease, border-color .2s ease;
}
.seg button{
  display:inline-flex; align-items:center; justify-content:center; gap:5px;
  height:24px; min-width:26px; padding:0 8px;
  border:0; border-radius:999px; background:transparent; color:var(--muted);
  font:inherit; font-size:11.5px; font-weight:600; cursor:pointer;
  transition: background-color .16s ease, color .16s ease;
}
.seg button:hover{ color:var(--fg); }
.seg button[aria-pressed="true"]{ background:var(--bg); color:var(--accent);
  box-shadow:0 1px 2px color-mix(in srgb, var(--fg) 14%, transparent); }
.seg.lang button{ font-family:var(--ui-font); letter-spacing:.02em; }

/* 창 컨트롤(윈도우 느낌) */
.wctl{ display:flex; align-items:center; gap:2px; margin-left:4px; -webkit-app-region:no-drag; }
.wctl button{
  width:30px; height:28px; border:0; background:transparent; color:var(--muted);
  border-radius:var(--r-sm); cursor:pointer; display:grid; place-items:center;
  transition: background-color .14s ease, color .14s ease;
}
.wctl button:hover{ background:var(--hover); color:var(--fg); }
.wctl button.close:hover{ background:#e81123; color:#fff; }

/* ============================================================
   4. 사이드바
   ============================================================ */
.sidebar{
  grid-area:sidebar;
  border-right:1px solid var(--border);
  background: color-mix(in srgb, var(--surface) 60%, var(--bg));
  overflow:auto; padding:10px 8px;
  transition: background-color .26s ease, border-color .26s ease;
}
.sec-label{
  display:flex; align-items:center; gap:6px;
  font-size:10.5px; font-weight:700; letter-spacing:.11em; text-transform:uppercase;
  color:var(--muted); padding:12px 8px 6px;
}
.sec-label:first-child{ padding-top:2px; }
.sec-label .ic{ width:13px; height:13px; }

.tree{ list-style:none; margin:0; padding:0; }
.node{
  display:flex; align-items:center; gap:7px;
  height:28px; padding:0 8px; border-radius:var(--r-sm);
  color:var(--fg); font-size:13px; cursor:pointer; user-select:none;
  transition: background-color .12s ease, color .12s ease;
}
.node:hover{ background:var(--hover); }
.node .ic{ flex:none; color:var(--muted); }
.node.folder > .chev{ transition: transform .16s ease; color:var(--muted); }
.node.folder.open > .chev{ transform:rotate(90deg); }
.node .name{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.node .badge{ margin-left:auto; font-size:10px; color:var(--muted); }
.children{ list-style:none; margin:0; padding:0 0 0 16px; }
.node.file .ic{ color:color-mix(in srgb, var(--accent) 34%, var(--muted)); }
.node.active{ background:var(--active-bg); color:var(--fg); font-weight:600;
  box-shadow: inset 2px 0 0 var(--accent); }
.node.active .ic{ color:var(--accent); }
.node.fav .ic{ color:#e0a83a; }

/* ============================================================
   5. 콘텐츠(탭 + 분할)
   ============================================================ */
.content{ grid-area:content; min-width:0; min-height:0; display:flex; flex-direction:column; }

.tabbar{
  display:flex; align-items:stretch; height:38px;
  border-bottom:1px solid var(--border);
  background: color-mix(in srgb, var(--surface) 40%, var(--bg));
  padding:0 6px; gap:2px;
  transition: background-color .26s ease, border-color .26s ease;
}
.tab{
  display:inline-flex; align-items:center; gap:8px;
  padding:0 10px 0 12px; margin-top:5px;
  border:1px solid transparent; border-bottom:0;
  border-radius:var(--r-sm) var(--r-sm) 0 0;
  background:transparent; color:var(--muted); font:inherit; font-size:12.5px;
  cursor:pointer; max-width:180px;
  transition: background-color .14s ease, color .14s ease, border-color .14s ease;
}
.tab:hover{ background:var(--hover); color:var(--fg); }
.tab .tname{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tab .close{ display:grid; place-items:center; width:16px; height:16px; border-radius:4px; color:var(--muted); }
.tab .close:hover{ background:color-mix(in srgb, var(--fg) 12%, transparent); color:var(--fg); }
.tab .dirty{ width:7px; height:7px; border-radius:50%; background:var(--accent); flex:none; }
.tab.active{
  background:var(--bg); color:var(--fg); font-weight:600;
  border-color:var(--border);
  box-shadow: 0 -2px 0 var(--accent) inset;
}
.tab-add{ align-self:center; margin-left:2px; width:26px; height:26px; border:0; border-radius:var(--r-sm);
  background:transparent; color:var(--muted); cursor:pointer; display:grid; place-items:center; }
.tab-add:hover{ background:var(--hover); color:var(--fg); }

/* 분할 뷰 */
.split{ flex:1; min-height:0; display:grid; grid-template-columns:1fr 7px 1fr; }

/* --- 에디터(원고 / mono) --- */
.editor{
  min-width:0; overflow:auto;
  background:var(--bg);
  font-family:var(--mono-font); font-size:13px; line-height:1.62;
  padding:12px 0 60px;
  transition: background-color .26s ease;
}
.row{ display:flex; align-items:baseline; min-height:1.62em; padding:0 4px; }
.row .gutter{
  flex:none; width:42px; padding-right:14px; text-align:right;
  color:var(--faint); font-size:12px; user-select:none;
  font-variant-numeric:tabular-nums;
}
.row .line{ white-space:pre-wrap; word-break:break-word; color:var(--fg); }
.row.active{ background: color-mix(in srgb, var(--accent) 6%, var(--bg)); }
.row.active .gutter{ color:var(--accent); }

/* 문법 하이라이트 토큰 (전부 토큰에서 파생) */
.t-h{ color:var(--accent); font-weight:600; }
.t-b{ color:var(--fg); font-weight:700; }
.t-m{ color:var(--muted); }
.t-x{ color:var(--accent); font-weight:700; }
.t-q{ color:var(--muted); font-style:italic; }
.t-c{ color:var(--tok-code); }
.t-f{ color:var(--muted); }
.t-cf{ color:var(--faint); }

.caret{ display:inline-block; width:1.5px; height:1.15em; margin-left:1px;
  background:var(--accent); transform:translateY(2px); animation:blink 1.05s step-end infinite; }
@keyframes blink{ 50%{ opacity:0; } }

/* --- 이음새(seam) : 시그니처 --- */
.seam{
  position:relative; cursor:col-resize;
  background: linear-gradient(to right,
    transparent, color-mix(in srgb, var(--accent) 24%, var(--border)), transparent);
  transition: background .2s ease;
}
.seam::before{
  content:""; position:absolute; inset:0 0 0 3px; width:1px;
  background: color-mix(in srgb, var(--accent) 30%, var(--border));
}
.seam::after{ /* 핸들 */
  content:""; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:4px; height:34px; border-radius:999px;
  background: color-mix(in srgb, var(--accent) 45%, var(--border));
  transition: height .18s ease, background .18s ease;
}
.seam:hover::after{ height:52px; background:var(--accent); }

/* --- 미리보기(조판 페이지 / serif) --- */
.preview{
  min-width:0; overflow:auto;
  background:var(--sunken);
  padding:26px 26px 60px;
  transition: background-color .26s ease;
}
.page{
  max-width:660px; margin:0 auto;
  background:var(--bg);
  border:1px solid color-mix(in srgb, var(--fg) 8%, var(--border));
  border-radius:var(--r-md);
  box-shadow:var(--shadow);
  padding:44px 52px 52px;
  font-family:var(--read-font); color:var(--fg);
  transition: background-color .26s ease, border-color .26s ease, box-shadow .26s ease;
}
/* paper 테마 전용: 은은한 종이 결 */
:root[data-theme="paper"] .page{
  background-image:
    repeating-linear-gradient(0deg, transparent 0 3px,
      color-mix(in srgb, var(--fg) 2.2%, transparent) 3px 4px);
}

.page h1{ font-size:30px; line-height:1.18; margin:0 0 6px; font-weight:600; letter-spacing:-.01em; }
.page .lead{ color:var(--muted); font-size:16.5px; margin:0 0 8px; }
.page h1 + .lead{ padding-bottom:14px; border-bottom:1px solid var(--border); margin-bottom:22px; }
.page h2{ font-size:21px; margin:30px 0 12px; font-weight:600;
  padding-bottom:5px; border-bottom:1px solid var(--border); }
.page p{ font-size:16px; line-height:1.75; margin:0 0 15px; }

.page ol{ margin:0 0 16px; padding-left:24px; font-size:16px; line-height:1.75; }
.page ol li{ margin:4px 0; padding-left:4px; }

.tasklist{ list-style:none; margin:0 0 16px; padding:0; }
.tasklist li{ display:flex; align-items:baseline; gap:11px; font-size:16px; line-height:1.7; margin:7px 0; }
.tasklist .box{
  flex:none; width:17px; height:17px; border-radius:5px;
  border:1.6px solid var(--faint); position:relative; transform:translateY(3px);
}
.tasklist li.checked .box{ background:var(--accent); border-color:var(--accent); }
.tasklist li.checked .box::after{
  content:""; position:absolute; left:5px; top:2px; width:4px; height:8px;
  border:solid #fff; border-width:0 2px 2px 0; transform:rotate(42deg);
}
.tasklist li.checked{ color:var(--muted); }

.page blockquote{
  margin:0 0 18px; padding:6px 0 6px 18px;
  border-left:3px solid var(--accent);
  color:var(--muted); font-style:italic; font-size:16px;
}

.page table{ width:100%; border-collapse:collapse; margin:0 0 18px; font-size:14.5px;
  font-family:var(--ui-font); }
.page th,.page td{ text-align:left; padding:8px 12px; border:1px solid var(--border); }
.page thead th{ background:var(--surface); font-weight:600; }
.page tbody tr:nth-child(even) td{ background: color-mix(in srgb, var(--surface) 45%, var(--bg)); }

.page code{
  font-family:var(--mono-font); font-size:.86em;
  background: color-mix(in srgb, var(--accent) 12%, var(--bg));
  color:var(--tok-code); padding:2px 6px; border-radius:5px;
}
.page kbd{
  font-family:var(--mono-font); font-size:12px;
  background:var(--surface); border:1px solid var(--border);
  border-bottom-width:2px; border-radius:5px; padding:2px 7px; margin-right:4px;
}
.kbds{ list-style:none; margin:0; padding:0; font-family:var(--ui-font); }
.kbds li{ display:flex; align-items:center; gap:4px; margin:9px 0; font-size:15px; }
.kbds li span{ color:var(--muted); margin-left:6px; }

.page .math{ font-family:var(--read-font); font-style:italic; font-size:17px;
  padding:0 3px; letter-spacing:.01em; }
.page .math sup{ font-style:normal; }

.diagram{ margin:20px 0 4px; padding:18px; text-align:center;
  background: color-mix(in srgb, var(--surface) 50%, var(--bg));
  border:1px dashed var(--border); border-radius:var(--r-md); }
.diagram svg{ max-width:100%; height:auto; }
.diagram .cap{ display:block; margin-top:10px; font-family:var(--ui-font);
  font-size:11.5px; color:var(--muted); letter-spacing:.03em; }

/* ============================================================
   6. 상태바
   ============================================================ */
.statusbar{
  grid-area:statusbar;
  display:flex; align-items:center; gap:0;
  border-top:1px solid var(--border);
  background: color-mix(in srgb, var(--surface) 55%, var(--bg));
  font-size:11.5px; color:var(--muted); padding:0 4px;
  font-variant-numeric:tabular-nums;
  transition: background-color .26s ease, border-color .26s ease;
}
.st{ display:inline-flex; align-items:center; gap:6px; padding:0 12px; height:100%; }
.st + .st{ border-left:1px solid var(--border); }
.st.right{ margin-left:auto; }
.st .dot-ok{ width:7px; height:7px; border-radius:50%; background:#3fb950; }
.st .dot-dirty{ width:7px; height:7px; border-radius:50%; background:var(--accent); }
.st strong{ color:var(--fg); font-weight:600; }

/* ============================================================
   7. 아이콘
   ============================================================ */
.ic{ width:16px; height:16px; display:inline-block; vertical-align:middle; flex:none;
  fill:none; stroke:currentColor; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
.sprite{ position:absolute; width:0; height:0; overflow:hidden; }

/* ============================================================
   8. 접근성 & 포커스
   ============================================================ */
:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; border-radius:4px; }
.tbtn:focus-visible, .seg button:focus-visible{ outline-offset:1px; }

/* ============================================================
   9. 모션(로드 연출) — reduced-motion 존중
   ============================================================ */
@media (prefers-reduced-motion: no-preference){
  .titlebar{ animation:fadeDown .45s ease both; }
  .sidebar{ animation:slideRight .5s cubic-bezier(.2,.7,.2,1) both .05s; }
  .tabbar{ animation:fadeDown .45s ease both .12s; }
  .statusbar{ animation:fadeUp .45s ease both .18s; }
  .row{ animation:riseIn .38s ease both; animation-delay: calc(var(--i) * 22ms + 240ms); }
  .page{ animation:pageIn .6s cubic-bezier(.2,.7,.2,1) both .34s; }
  .seam::after{ animation:fadeIn .5s ease both .5s; }
}
@keyframes fadeDown{ from{ opacity:0; transform:translateY(-6px); } }
@keyframes fadeUp{ from{ opacity:0; transform:translateY(6px); } }
@keyframes fadeIn{ from{ opacity:0; } }
@keyframes slideRight{ from{ opacity:0; transform:translateX(-14px); } }
@keyframes riseIn{ from{ opacity:0; transform:translateY(5px); } }
@keyframes pageIn{ from{ opacity:0; transform:translateY(18px) scale(.985); } }

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{ animation-duration:.001ms !important; animation-delay:0ms !important;
    transition-duration:.001ms !important; }
  .caret{ animation:none !important; }
}

/* ============================================================
   10. 반응형 (≤ 900px : 사이드바 접힘, 패널 세로 스택)
   ============================================================ */
@media (max-width:900px){
  body{ padding:0; }
  .app{ width:100%; height:100vh; border-radius:0; border:0; grid-template-columns:1fr; }
  .sidebar{ display:none; }
  .app{ grid-template-areas:"titlebar" "content" "statusbar"; grid-template-rows:44px 1fr 27px; }
  .split{ grid-template-columns:1fr; grid-template-rows:1fr 7px 1fr; }
  .seam{ cursor:row-resize; background:linear-gradient(to bottom, transparent,
    color-mix(in srgb, var(--accent) 24%, var(--border)), transparent); }
  .seam::before{ inset:3px 0 0 0; width:auto; height:1px; }
  .seam::after{ width:34px; height:4px; }
  .search{ width:150px; }
  .search:focus-within{ width:160px; }

/* ============================================================
   상태 & 렌더
   ============================================================ */
const root = document.documentElement;
let lang = "ko", theme = "light", activeDoc = "readme";

function t(key){ return (I18N[lang] && I18N[lang][key]) || key; }

function applyI18n(){
  document.querySelectorAll("[data-i18n]").forEach(el=> el.textContent = t(el.dataset.i18n));
  document.querySelectorAll("[data-i18n-ph]").forEach(el=> el.placeholder = t(el.dataset.i18nPh));
  document.querySelectorAll("[data-i18n-title]").forEach(el=> el.title = t(el.dataset.i18nTitle));
  document.documentElement.lang = lang;
}

function renderDoc(){
  const d = DOCS[activeDoc], v = d[lang];
  // 에디터 소스 (줄번호 + 하이라이트)
  const editor = document.getElementById("editor");
  editor.innerHTML = v.src.map((line,i)=>{
    const isActive = i === d.active;
    const caret = isActive ? '<span class="caret"></span>' : '';
    return `<div class="row${isActive?' active':''}" style="--i:${i}">`+
           `<span class="gutter">${i+1}</span>`+
           `<span class="line">${line || '&nbsp;'}${caret}</span></div>`;
  }).join("");
  // 미리보기 조판 페이지
  document.getElementById("page").innerHTML = v.html;
  // 상태바
  document.getElementById("stLn").textContent = d.ln;
  document.getElementById("stCol").textContent = d.col;
  document.getElementById("stWords").textContent = d.words[lang];
  const dot = document.getElementById("stStateDot"), st = document.getElementById("stState");
  dot.className = d.dirty ? "dot-dirty" : "dot-ok";
  st.textContent = d.dirty ? t("status.unsaved") : t("status.saved");
}

function setTheme(next){
  theme = next; root.dataset.theme = next;
  document.querySelectorAll(".seg.theme button").forEach(b=>
    b.setAttribute("aria-pressed", String(b.dataset.themeSet === next)));
  document.getElementById("stTheme").textContent = t("theme."+next);
}

function setLang(next){
  lang = next; localeButtons(next);
  applyI18n(); renderDoc();
  document.getElementById("stTheme").textContent = t("theme."+theme);
}
function localeButtons(next){
  document.querySelectorAll(".seg.lang button").forEach(b=>
    b.setAttribute("aria-pressed", String(b.dataset.langSet === next)));
}

function setActiveDoc(doc){
  activeDoc = doc;
  document.querySelectorAll(".tab").forEach(tab=>{
    const on = tab.dataset.doc === doc;
    tab.classList.toggle("active", on);
    tab.setAttribute("aria-selected", String(on));
  });
  // 사이드바 활성 파일 동기화
  const name = doc === "readme" ? "README.md" : "guide.md";
  document.querySelectorAll(".sidebar .node.file").forEach(n=>{
    n.classList.toggle("active", n.querySelector(".name").textContent === name);
  });
  renderDoc();
}

/* ============================================================
   이벤트 바인딩
   ============================================================ */
document.querySelectorAll(".seg.theme button").forEach(b=>
  b.addEventListener("click", ()=> setTheme(b.dataset.themeSet)));
document.querySelectorAll(".seg.lang button").forEach(b=>
  b.addEventListener("click", ()=> setLang(b.dataset.langSet)));
document.querySelectorAll(".tab").forEach(tab=>
  tab.addEventListener("click", (e)=>{ if(!e.target.closest(".close")) setActiveDoc(tab.dataset.doc); }));

// 사이드바 폴더 접기/펴기
document.querySelectorAll(".node.folder").forEach(f=>{
  const toggle = ()=>{ f.classList.toggle("open");
    const ul = f.parentElement.querySelector(".children"); if(ul) ul.style.display = f.classList.contains("open") ? "" : "none"; };
  f.addEventListener("click", toggle);
  f.addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); toggle(); } });
});
// 사이드바 파일 클릭 → 해당 탭으로
document.querySelectorAll(".sidebar .node.file").forEach(n=>{
  n.addEventListener("click", ()=>{
    const nm = n.querySelector(".name").textContent;
    if(nm==="README.md") setActiveDoc("readme");
    else if(nm==="guide.md") setActiveDoc("guide");
  });
});

/* 초기 렌더 */
setTheme("light");
localeButtons("ko");
applyI18n();
renderDoc();
</script>
</body>
</html>
