<!doctype html>
<!-- 앱 아이콘 소스 렌더용. 1024x1024 로 헤드리스 캡처 → npx tauri icon 입력. -->
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; padding: 0; }
  .icon {
    width: 1024px;
    height: 1024px;
    background: #2563eb; /* accent(light) */
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon svg { width: 620px; height: 620px; }
</style>
</head>
<body>
  <div class="icon">
    <svg viewBox="0 0 100 100">
      <g fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M24 66V38l15 17 15-17v28" />

</html>
